info:
  contact:
    name: SmartSystem Support
  description: Stateless API that parses raw MCQ question text and exports to Google
    Sheets.
  title: Question Parser & Google Sheets Exporter API
  version: "1.0"
paths:
  /convert:
    post:
      consumes:
      - text/plain
      description: Parses raw text containing MCQs and converts it into a structured
        JSON array
      parameters:
      - description: Raw text containing questions
        in: body
        name: text
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.MCQ'
            type: array
        "400":
          description: Invalid request
          schema:
            type: string
      summary: Convert raw text to JSON MCQs
      tags:
      - mcq
  /convert/dq:
    post:
      consumes:
      - text/plain
      description: Paste raw question text containing Explanation lines. Returns questions
        with text, explanation, options, and answer extracted.
      parameters:
      - description: Raw DQ question text
        in: body
        name: text
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/parser.ParsedDQQuestion'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Convert raw Decision & Quiz text into structured JSON (with Explanation)
      tags:
      - Decision & Quiz
  /export:
    get:
      description: Takes the recently parsed data from memory and returns an Excel
        file (.xlsx) download.
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: questions.xlsx
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Export parsed MCQ questions to Excel
      tags:
      - Export
  /export/dq:
    get:
      description: Takes the recently parsed Decision & Quiz data from memory and
        returns an Excel file (.xlsx) with title and explanation columns.
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: dq_questions.xlsx
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Export parsed Decision & Quiz questions to Excel
      tags:
      - Decision & Quiz
  /parse:
    post:
      consumes:
      - application/json
      description: Accepts JSON structured questions, validates them, and flattens
        options A-D with correctness flags.
      parameters:
      - description: Structured questions + metadata
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.ParseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.ParsedFlatQuestion'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Parse structured MCQ JSON into flattened format
      tags:
      - Parser
  /parse/dq:
    post:
      consumes:
      - application/json
      description: Accepts JSON structured questions with title and explanation, validates
        them, and flattens options A-D with correctness flags.
      parameters:
      - description: Structured DQ questions + metadata
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.DQParseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.ParsedFlatDQQuestion'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Parse structured Decision & Quiz JSON into flattened format
      tags:
      - Decision & Quiz
schemes:
- http
swagger: "2.0"
